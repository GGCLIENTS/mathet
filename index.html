<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Матриц бодлогын сайт</title>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#4facfe,#00f2fe);
margin:0;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:white;
width:720px;
padding:25px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

nav{
text-align:center;
margin-bottom:15px;
}

nav button{
margin:5px;
padding:10px 20px;
border:none;
background:#4facfe;
color:white;
border-radius:6px;
cursor:pointer;
}

nav button:hover{
background:#2d8cf0;
}

.page{
display:none;
}

.active{
display:block;
}

.problem{
font-size:20px;
margin-bottom:15px;
}

input{
width:100%;
padding:10px;
font-size:16px;
border-radius:6px;
border:1px solid #ccc;
}

button.next{
width:100%;
margin-top:10px;
padding:10px;
background:#4facfe;
color:white;
border:none;
border-radius:6px;
}

.example{
background:#f7f7f7;
padding:10px;
border-left:5px solid #4facfe;
margin-bottom:12px;
}

</style>
</head>

<body>

<div class="container">

<nav>
<button onclick="showPage('learn')">Матриц сурах</button>
<button onclick="showPage('quiz')">Бодлого бодох</button>
</nav>

<!-- СУРАХ ХЭСЭГ -->

<div id="learn" class="page active">

<h2>Матрицын жишээ</h2>

<div class="example">
<b>Матриц нэмэх</b><br>
A = [1 2]<br>
&nbsp;&nbsp;&nbsp;&nbsp;[3 4]<br>
B = [5 6]<br>
&nbsp;&nbsp;&nbsp;&nbsp;[7 8]<br><br>

A + B = [6 8]<br>
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;[10 12]
</div>

<div class="example">
<b>Матриц транспоз</b><br>

A = [1 2]<br>
&nbsp;&nbsp;&nbsp;&nbsp;[3 4]<br><br>

Aᵀ =<br>
[1 3]<br>
[2 4]
</div>

<div class="example">
<b>2×2 матрицын детерминант</b><br>

|a b|<br>
|c d|<br><br>

det = ad − bc
</div>

</div>

<!-- БОДЛОГЫН ХЭСЭГ -->

<div id="quiz" class="page">

<h2>Матрицын бодлого</h2>

<div class="problem" id="problem"></div>

<input id="answer" placeholder="Хариугаа бичнэ үү">

<button class="next" onclick="nextProblem()">Хариу илгээх</button>

</div>

</div>

<script>

function showPage(page){

document.querySelectorAll(".page").forEach(p=>{
p.classList.remove("active")
})

document.getElementById(page).classList.add("active")

}

const problems=[

{q:"|1 2; 3 4| матрицын детерминант хэд вэ?",a:"-2"},
{q:"|2 3; 1 4| матрицын детерминант хэд вэ?",a:"5"},
{q:"|5 1; 2 3| матрицын детерминант хэд вэ?",a:"13"},
{q:"[1 2; 3 4] матрицын транспозын 1-р мөр 2-р баганын элемент хэд вэ?",a:"3"},
{q:"[5 7; 2 6] матрицын транспозын 2-р мөр 1-р баганын элемент хэд вэ?",a:"7"},
{q:"A=[1 2;3 4], B=[5 6;7 8] бол A+B матрицын 1-р мөр 1-р баганын элемент?",a:"6"},
{q:"A=[1 2;3 4], B=[5 6;7 8] бол A+B матрицын 2-р мөр 2-р баганын элемент?",a:"12"},
{q:"[1 2;3 4] матриц хэдэн мөртэй вэ?",a:"2"},
{q:"[1 2;3 4] матриц хэдэн баганатай вэ?",a:"2"},
{q:"|3 2;1 5| матрицын детерминант?",a:"13"},
{q:"|4 1;2 3| матрицын детерминант?",a:"10"},
{q:"[8 9;4 2] матрицын транспозын 1-р мөр 2-р баганын элемент?",a:"4"},
{q:"[8 9;4 2] матрицын транспозын 2-р мөр 1-р баганын элемент?",a:"9"},
{q:"A=[2 2;2 2] бол A+A матрицын 1-р мөр 1-р баганын элемент?",a:"4"},
{q:"A=[2 2;2 2] бол A+A матрицын 2-р мөр 2-р баганын элемент?",a:"4"}

]

let shuffled=problems.sort(()=>Math.random()-0.5)
let current=0
let score=0
let points=0

function loadProblem(){

document.getElementById("problem").innerText =
(current+1)+". "+shuffled[current].q

document.getElementById("answer").value=""

}

function nextProblem(){

let user=document.getElementById("answer").value.trim()

if(user===""){
alert("Хариугаа оруулна уу")
return
}

if(user==shuffled[current].a){
score++
points+=10
}

current++

if(current<shuffled.length){
loadProblem()
}else{

document.getElementById("quiz").innerHTML=
"<h2>Дууслаа</h2>"+
"<p>Зөв бодсон: "+score+" / 15</p>"+
"<p>Нийт оноо: "+points+"</p>"+
"<button onclick='location.reload()'>Дахин эхлэх</button>"

}

}

loadProblem()

</script>

</body>
</html>
