<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Матриц бодлого</title>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family: 'Segoe UI', sans-serif;
background:#0f172a;
color:#e2e8f0;
}

/* CONTAINER */
.container{
width:100%;
min-height:100vh;
padding:20px;
display:flex;
justify-content:center;
align-items:flex-start;
}

/* CARD */
.card{
width:100%;
max-width:900px;
background:#1e293b;
border-radius:16px;
padding:25px;
box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

/* NAV */
nav{
display:flex;
gap:10px;
margin-bottom:20px;
}

nav button{
flex:1;
padding:12px;
font-size:15px;
border:none;
background:#334155;
color:#e2e8f0;
border-radius:10px;
cursor:pointer;
transition:0.2s;
}

nav button:hover{
background:#3b82f6;
}

/* TITLE */
h2{
text-align:center;
margin-bottom:20px;
}

/* PAGE */
.page{
display:none;
}

.active{
display:block;
}

/* IMAGE GRID */
.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:15px;
}

.gallery img{
width:100%;
border-radius:12px;
transition:0.3s;
cursor:pointer;
}

.gallery img:hover{
transform:scale(1.05);
}

/* QUIZ */
.question{
margin-bottom:18px;
padding:12px;
background:#0f172a;
border-radius:10px;
}

.question p{
margin:0 0 8px;
}

input{
width:100%;
padding:10px;
border-radius:8px;
border:none;
background:#1e293b;
color:white;
}

/* BUTTON */
button.main{
width:100%;
padding:14px;
margin-top:15px;
font-size:16px;
background:#3b82f6;
border:none;
border-radius:10px;
color:white;
cursor:pointer;
}

button.main:hover{
background:#2563eb;
}

/* RESULT */
.result{
margin-top:20px;
text-align:center;
font-size:18px;
}

</style>
</head>

<body>

<div class="container">
<div class="card">

<nav>
<button onclick="showPage('learn')">Сурах</button>
<button onclick="showPage('quiz')">Бодлого</button>
</nav>

<!-- LEARN (MULTIPLE IMAGES) -->

<div id="learn" class="page active">

<h2>Матрицын тайлбар</h2>

<div class="gallery">
<img src="e77472fa-9b62-4870-acab-aadc3390a72f (1)(1).png" alt="">
<img src="e77472fa-9b62-4870-acab-aadc3390a72f (2)(1).png" alt="">
</div>

</div>

<!-- QUIZ -->

<div id="quiz" class="page">

<h2>Матриц бодлого</h2>

<div id="questions"></div>

<button class="main" onclick="checkAnswers()">Бүгдийг шалгах</button>

<div class="result" id="result"></div>

</div>

</div>
</div>

<script>

function showPage(page){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"))
document.getElementById(page).classList.add("active")
}

const problems=[

{q:"|1 2; 3 4| детерминант?",a:"-2"},
{q:"|2 3; 1 4| детерминант?",a:"5"},
{q:"|5 1; 2 3| детерминант?",a:"13"},
{q:"[1 2; 3 4] транспозын (1,2)?",a:"3"},
{q:"[5 7; 2 6] транспозын (2,1)?",a:"7"},
{q:"A+B (1,1)? A=[1 2;3 4], B=[5 6;7 8]",a:"6"},
{q:"A+B (2,2)? A=[1 2;3 4], B=[5 6;7 8]",a:"12"},
{q:"[1 2;3 4] мөр хэд вэ?",a:"2"},
{q:"[1 2;3 4] багана хэд вэ?",a:"2"},
{q:"|3 2;1 5| детерминант?",a:"13"},
{q:"|4 1;2 3| детерминант?",a:"10"},
{q:"[8 9;4 2] транспоз (1,2)?",a:"4"},
{q:"[8 9;4 2] транспоз (2,1)?",a:"9"},
{q:"A+A (1,1)? A=[2 2;2 2]",a:"4"},
{q:"A+A (2,2)? A=[2 2;2 2]",a:"4"}

]

let shuffled = problems.sort(()=>Math.random()-0.5)

function loadQuestions(){

let container = document.getElementById("questions")

shuffled.forEach((p,index)=>{

container.innerHTML += `
<div class="question">
<p>${index+1}. ${p.q}</p>
<input id="q${index}" placeholder="Хариу бич">
</div>
`

})

}

function checkAnswers(){

let score = 0
let points = 0

shuffled.forEach((p,index)=>{

let user = document.getElementById("q"+index).value.trim()

if(user === p.a){
score++
points += 10
}

})

document.getElementById("result").innerHTML =
`Зөв: ${score} / 15 <br> Оноо: ${points}`

}

loadQuestions()

</script>

</body>
</html>
