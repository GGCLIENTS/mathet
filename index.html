<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Матриц бодлого</title>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:Arial, sans-serif;
background:linear-gradient(135deg,#4facfe,#00f2fe);
}

/* FULL SCREEN */
.container{
width:100%;
min-height:100vh;
padding:15px;
}

/* CARD */
.card{
background:white;
width:100%;
min-height:100%;
border-radius:12px;
padding:20px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

/* NAV */
nav{
display:flex;
gap:10px;
margin-bottom:15px;
}

nav button{
flex:1;
padding:12px;
font-size:16px;
border:none;
background:#4facfe;
color:white;
border-radius:8px;
}

/* TEXT */
h2{
text-align:center;
font-size:22px;
}

.problem{
font-size:20px;
margin-bottom:15px;
}

input{
width:100%;
padding:14px;
font-size:18px;
border-radius:8px;
border:1px solid #ccc;
}

/* BUTTON */
button.main{
width:100%;
padding:14px;
margin-top:10px;
font-size:18px;
background:#4facfe;
color:white;
border:none;
border-radius:8px;
}

/* EXAMPLES */
.example{
background:#f7f7f7;
padding:12px;
border-left:5px solid #4facfe;
margin-bottom:12px;
font-size:16px;
}

/* PAGE */
.page{
display:none;
}

.active{
display:block;
}

</style>
</head>

<body>

<div class="container">
<div class="card">

<nav>
<button onclick="showPage('learn')">Сурах</button>
<button onclick="showPage('quiz')">Бодлого</button>
</nav>

<!-- СУРАХ -->

<div id="learn" class="page active">

<h2>Матрицын жишээ</h2>

<div class="example">
<b>Матриц нэмэх</b><br>
A = [1 2]<br>
[3 4]<br>
B = [5 6]<br>
[7 8]<br><br>

A + B = [6 8]<br>
[10 12]
</div>

<div class="example">
<b>Транспоз</b><br>
A = [1 2]<br>
[3 4]<br><br>

Aᵀ =<br>
[1 3]<br>
[2 4]
</div>

<div class="example">
<b>Детерминант</b><br>
|a b|<br>
|c d|<br>
det = ad − bc
</div>

</div>

<!-- БОДЛОГО -->

<div id="quiz" class="page">

<h2>Матриц бодлого</h2>

<div class="problem" id="problem"></div>

<input id="answer" placeholder="Хариугаа бич">

<button class="main" onclick="nextProblem()">Илгээх</button>

</div>

</div>
</div>

<script>

function showPage(page){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"))
document.getElementById(page).classList.add("active")
}

const problems=[

{q:"|1 2; 3 4| детерминант?",a:"-2"},
{q:"|2 3; 1 4| детерминант?",a:"5"},
{q:"|5 1; 2 3| детерминант?",a:"13"},
{q:"[1 2; 3 4] транспозын (1,2)?",a:"3"},
{q:"[5 7; 2 6] транспозын (2,1)?",a:"7"},
{q:"A+B (1,1)? A=[1 2;3 4], B=[5 6;7 8]",a:"6"},
{q:"A+B (2,2)? A=[1 2;3 4], B=[5 6;7 8]",a:"12"},
{q:"[1 2;3 4] мөр хэд вэ?",a:"2"},
{q:"[1 2;3 4] багана хэд вэ?",a:"2"},
{q:"|3 2;1 5| детерминант?",a:"13"},
{q:"|4 1;2 3| детерминант?",a:"10"},
{q:"[8 9;4 2] транспоз (1,2)?",a:"4"},
{q:"[8 9;4 2] транспоз (2,1)?",a:"9"},
{q:"A+A (1,1)? A=[2 2;2 2]",a:"4"},
{q:"A+A (2,2)? A=[2 2;2 2]",a:"4"}

]

let shuffled=problems.sort(()=>Math.random()-0.5)
let current=0
let score=0
let points=0

function loadProblem(){
document.getElementById("problem").innerText =
(current+1)+". "+shuffled[current].q
document.getElementById("answer").value=""
}

function nextProblem(){

let user=document.getElementById("answer").value.trim()

if(user===""){
alert("Хариу оруул")
return
}

if(user==shuffled[current].a){
score++
points+=10
}

current++

if(current<shuffled.length){
loadProblem()
}else{

document.getElementById("quiz").innerHTML=
"<h2>Дууслаа</h2>"+
"<p>"+score+" / 15 зөв</p>"+
"<p>Оноо: "+points+"</p>"+
"<button onclick='location.reload()'>Дахин эхлэх</button>"

}

}

loadProblem()

</script>

</body>
</html>
