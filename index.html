<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Матриц бодлого</title>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:#0f172a;
color:#e2e8f0;
}

/* CONTAINER */
.container{
width:100%;
min-height:100vh;
padding:20px;
display:flex;
justify-content:center;
align-items:flex-start;
}

/* CARD */
.card{
width:100%;
max-width:950px;
background:#1e293b;
border-radius:16px;
padding:25px;
box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

/* NAV */
nav{
display:flex;
gap:10px;
margin-bottom:20px;
}

nav button{
flex:1;
padding:12px;
font-size:15px;
border:none;
background:#334155;
color:#e2e8f0;
border-radius:10px;
cursor:pointer;
transition:0.2s;
}

nav button:hover{
background:#3b82f6;
}

/* TITLE */
h2{
text-align:center;
margin-bottom:20px;
}

/* PAGE */
.page{
display:none;
}

.active{
display:block;
}

/* IMAGE GRID */
.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:15px;
}

.gallery img{
width:100%;
border-radius:12px;
transition:0.3s;
cursor:pointer;
}

.gallery img:hover{
transform:scale(1.03);
}

/* QUESTION */
.question{
margin-bottom:20px;
padding:15px;
background:#0f172a;
border-radius:12px;
}

.question p{
font-size:17px;
margin-bottom:12px;
line-height:1.6;
}

/* OPTIONS */
.option{
display:block;
padding:10px;
margin-bottom:8px;
background:#1e293b;
border-radius:8px;
cursor:pointer;
transition:0.2s;
}

.option:hover{
background:#334155;
}

.option input{
margin-right:8px;
}

/* BUTTON */
button.main{
width:100%;
padding:14px;
margin-top:15px;
font-size:16px;
background:#3b82f6;
border:none;
border-radius:10px;
color:white;
cursor:pointer;
transition:0.2s;
}

button.main:hover{
background:#2563eb;
}

/* RESULT */
.result{
margin-top:20px;
text-align:center;
font-size:20px;
font-weight:bold;
}

/* MATRIX STYLE */
.matrix{
display:inline-block;
position:relative;
padding:10px 18px;
margin:0 5px;
font-family:monospace;
font-size:18px;
line-height:1.8;
vertical-align:middle;
}

.matrix:before{
content:"";
position:absolute;
left:0;
top:0;
height:100%;
width:10px;
border-left:3px solid white;
border-top:3px solid white;
border-bottom:3px solid white;
}

.matrix:after{
content:"";
position:absolute;
right:0;
top:0;
height:100%;
width:10px;
border-right:3px solid white;
border-top:3px solid white;
border-bottom:3px solid white;
}

</style>
</head>

<body>

<div class="container">
<div class="card">

<nav>
<button onclick="showPage('learn')">Сурах</button>
<button onclick="showPage('quiz')">Бодлого</button>
</nav>

<!-- LEARN -->

<div id="learn" class="page active">

<h2>Матрицын тайлбар</h2>

<div class="gallery">
<img src="e77472fa-9b62-4870-acab-aadc3390a72f (1)(1).png">
<img src="e77472fa-9b62-4870-acab-aadc3390a72f (2)(1).png">
</div>

</div>

<!-- QUIZ -->

<div id="quiz" class="page">

<h2>Матриц бодлого</h2>

<div id="questions"></div>

<button class="main" onclick="checkAnswers()">
Бүгдийг шалгах
</button>

<div class="result" id="result"></div>

</div>

</div>
</div>

<script>

function showPage(page){
document.querySelectorAll(".page").forEach(p =>
p.classList.remove("active"))
document.getElementById(page).classList.add("active")
}

const problems = [

{
q:`<span class="matrix">
1 2<br>
3 4
</span>
+
<span class="matrix">
5 6<br>
7 8
</span>
матрицын (1,1)-г ол.`,
options:["5","6","7","8"],
a:"6"
},

{
q:`<span class="matrix">
9 8<br>
7 6
</span>
-
<span class="matrix">
1 2<br>
3 4
</span>
матрицын (2,2)-г ол.`,
options:["1","2","3","4"],
a:"2"
},

{
q:`<span class="matrix">
2 0<br>
1 3
</span>
×
<span class="matrix">
1 2<br>
4 1
</span>
матрицын (1,1)-г ол.`,
options:["2","4","6","8"],
a:"2"
},

{
q:`<span class="matrix">
2 1<br>
0 3
</span>
×
<span class="matrix">
4 2<br>
1 5
</span>
матрицын (1,2)-г ол.`,
options:["7","8","9","10"],
a:"9"
},

{
q:`<span class="matrix">
5 4<br>
3 2
</span>
матрицын детерминант хэд вэ?`,
options:["-4","-2","2","4"],
a:"-2"
},

{
q:`<span class="matrix">
1 2<br>
3 4
</span>
матрицын транспозын (2,1)-г ол.`,
options:["1","2","3","4"],
a:"2"
},

{
q:`<span class="matrix">
7 5<br>
2 1
</span>
+
<span class="matrix">
1 1<br>
1 1
</span>
матрицын (2,1)-г ол.`,
options:["2","3","4","5"],
a:"3"
},

{
q:`<span class="matrix">
8 7<br>
6 5
</span>
-
<span class="matrix">
2 1<br>
3 4
</span>
матрицын (1,2)-г ол.`,
options:["4","5","6","7"],
a:"6"
},

{
q:`<span class="matrix">
1 2<br>
3 4
</span>
×
<span class="matrix">
2 0<br>
1 2
</span>
матрицын (2,2)-г ол.`,
options:["6","7","8","9"],
a:"8"
},

{
q:`<span class="matrix">
3 1<br>
2 5
</span>
матриц хэдэн мөртэй вэ?`,
options:["1","2","3","4"],
a:"2"
},

{
q:`<span class="matrix">
3 1<br>
2 5
</span>
матриц хэдэн баганатай вэ?`,
options:["1","2","3","4"],
a:"2"
},

{
q:`<span class="matrix">
6 2<br>
1 4
</span>
матрицын детерминант хэд вэ?`,
options:["20","22","24","26"],
a:"22"
},

{
q:`<span class="matrix">
2 3<br>
4 5
</span>
матрицын транспозын (1,2)-г ол.`,
options:["2","3","4","5"],
a:"4"
},

{
q:`<span class="matrix">
1 1<br>
1 1
</span>
+
<span class="matrix">
2 2<br>
2 2
</span>
матрицын (2,2)-г ол.`,
options:["2","3","4","5"],
a:"3"
},

{
q:`<span class="matrix">
10 8<br>
6 4
</span>
-
<span class="matrix">
1 2<br>
3 1
</span>
матрицын (1,1)-г ол.`,
options:["7","8","9","10"],
a:"9"
}

]


let shuffled = problems.sort(() => Math.random() - 0.5)

function loadQuestions(){

let container = document.getElementById("questions")

shuffled.forEach((p,index)=>{

let optionsHTML = ""

p.options.forEach(option=>{

optionsHTML += `
<label class="option">
<input type="radio" name="q${index}" value="${option}">
${option}
</label>
`

})

container.innerHTML += `
<div class="question">
<p>${index+1}. ${p.q}</p>
${optionsHTML}
</div>
`

})

}

function checkAnswers(){

let score = 0
let points = 0

shuffled.forEach((p,index)=>{

let selected =
document.querySelector(`input[name="q${index}"]:checked`)

if(selected && selected.value === p.a){
score++
points += 10
}

})

document.getElementById("result").innerHTML =
`
Зөв хариулт: ${score} / ${shuffled.length}
<br>
Оноо: ${points}
`

}

loadQuestions()

</script>

</body>
</html>
